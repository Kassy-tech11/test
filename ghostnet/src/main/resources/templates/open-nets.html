<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Offene Geisternetze</title>
</head>
<body>

<h1>Offene Geisternetze</h1>

<a th:href="@{/report-net}">Neues Geisternetz melden</a>

<br><br>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Breitengrad</th>
        <th>Längengrad</th>
        <th>Größe</th>
        <th>Status</th>
        <th>Bergende Person</th>
        <th>Aktion</th>
    </tr>

    <tr th:each="net : ${ghostNets}">
        <td th:text="${net.id}"></td>
        <td th:text="${net.latitude}"></td>
        <td th:text="${net.longitude}"></td>
        <td th:text="${net.estimatedSize}"></td>
        <td th:text="${net.status}"></td>

        <td>
            <span th:if="${net.rescuer != null}" th:text="${net.rescuer.name}"></span>
            <span th:if="${net.rescuer == null}">Noch niemand</span>
        </td>

        <td>
            <a th:if="${net.rescuer == null}"
               th:href="@{/assign-net/{id}(id=${net.id})}">
                Bergung übernehmen
            </a>

            <form th:if="${net.status.name() == 'BERGUNG_BEVORSTEHEND'}"
                  th:action="@{/mark-recovered/{id}(id=${net.id})}"
                  method="post">
                <button type="submit">Als geborgen melden</button>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
